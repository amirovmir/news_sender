name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest pytest-asyncio

      - name: Lint with ruff
        run: ruff check bot/ tests/

      - name: Run smoke tests
        run: pytest tests/ -v --tb=short

  deploy:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Клонируем репо если нет, или пуллим
            if [ ! -d /opt/news_sender/.git ]; then
              rm -rf /opt/news_sender
              git clone https://github.com/amirovmir/news_sender.git /opt/news_sender
            fi

            cd /opt/news_sender
            git pull origin main

            # .env должен быть создан вручную один раз
            if [ ! -f deployments/.env ]; then
              echo "ERROR: deployments/.env not found on VPS. Create it first."
              exit 1
            fi

            cd deployments
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d --build

            # Проверяем что контейнер запустился
            sleep 5
            docker compose ps
